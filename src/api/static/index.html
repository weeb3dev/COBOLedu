<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBOLedu — GnuCOBOL Code Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1F4E79;
    color: #fff;
    padding: 1.25rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .02em; }
  header p  { font-size: .85rem; opacity: .8; margin-top: .25rem; }

  main {
    flex: 1;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: .35rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .mode-tab {
    font-size: .8rem;
    padding: .35rem .75rem;
    border-radius: 6px;
    border: 1px solid #c8d6e5;
    background: #fff;
    color: #1F4E79;
    cursor: pointer;
    transition: all .2s;
    font-weight: 500;
  }
  .mode-tab:hover { background: #eef2f7; }
  .mode-tab.active {
    background: #1F4E79;
    color: #fff;
    border-color: #1F4E79;
  }

  /* Search */
  .search-wrap {
    display: flex;
    gap: .5rem;
  }
  #q {
    flex: 1;
    padding: .7rem 1rem;
    font-size: 1rem;
    border: 2px solid #c8d6e5;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }
  #q:focus { border-color: #1F4E79; }
  #btn {
    padding: .7rem 1.4rem;
    font-size: 1rem;
    font-weight: 600;
    background: #1F4E79;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .2s;
    white-space: nowrap;
  }
  #btn:hover { opacity: .9; }
  #btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Status message */
  .status-msg {
    display: none;
    margin: 2rem auto;
    text-align: center;
    font-size: .95rem;
    color: #999;
    opacity: 0;
    transition: opacity .35s ease;
  }
  .status-msg.visible { opacity: 1; }

  /* Answer */
  #answer {
    display: none;
    margin-top: 1.5rem;
    background: #fff;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    line-height: 1.65;
    word-wrap: break-word;
  }
  #answer p { margin: .5em 0; }
  #answer ul, #answer ol { margin: .5em 0 .5em 1.5em; }
  #answer li { margin: .25em 0; }
  #answer code {
    background: #eef2f7;
    padding: .15em .35em;
    border-radius: 4px;
    font-size: .9em;
  }
  #answer pre {
    background: #1a1a2e;
    color: #e2e8f0;
    padding: 1rem;
    border-radius: 6px;
    overflow-x: auto;
    margin: .75rem 0;
    white-space: pre;
  }
  #answer pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  #answer pre { position: relative; }
  #answer .token.comment, #answer .token.prolog, #answer .token.doctype, #answer .token.cdata { color: #6a737d; }
  #answer .token.punctuation { color: #c9d1d9; }
  #answer .token.property, #answer .token.tag, #answer .token.boolean,
  #answer .token.number, #answer .token.constant, #answer .token.symbol { color: #79c0ff; }
  #answer .token.selector, #answer .token.attr-name, #answer .token.string,
  #answer .token.char, #answer .token.builtin { color: #a5d6ff; }
  #answer .token.operator, #answer .token.entity, #answer .token.url { color: #ff7b72; }
  #answer .token.atrule, #answer .token.attr-value, #answer .token.keyword { color: #ff79c6; }
  #answer .token.function, #answer .token.class-name { color: #d2a8ff; }
  #answer .token.regex, #answer .token.important, #answer .token.variable { color: #ffa657; }
  #answer h1, #answer h2, #answer h3 {
    margin-top: 1rem;
    margin-bottom: .4rem;
    color: #1F4E79;
  }
  #answer h2 { font-size: 1.1rem; }
  #answer h3 { font-size: 1rem; }

  /* Dependency badges */
  .dep-section { margin: .75rem 0; }
  .dep-section h4 { font-size: .9rem; color: #555; margin-bottom: .3rem; }
  .dep-list { display: flex; flex-wrap: wrap; gap: .35rem; }
  .dep-badge {
    display: inline-block;
    font-size: .78rem;
    font-weight: 600;
    padding: .2rem .55rem;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  .dep-badge.caller { background: #dbeafe; color: #1e40af; }
  .dep-badge.callee { background: #dcfce7; color: #166534; }

  /* Sources */
  #sources {
    display: none;
    margin-top: 1.25rem;
  }
  #sources h3 {
    font-size: .95rem;
    margin-bottom: .6rem;
    color: #555;
  }
  .src-card {
    background: #fff;
    border-radius: 8px;
    padding: .85rem 1rem;
    margin-bottom: .6rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .src-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    align-items: center;
    margin-bottom: .4rem;
  }
  .badge {
    display: inline-block;
    font-size: .75rem;
    font-weight: 600;
    padding: .2rem .55rem;
    border-radius: 4px;
    background: #1F4E79;
    color: #fff;
  }
  .score {
    font-size: .75rem;
    color: #888;
  }
  .src-preview {
    background: #f0f4f8;
    border-radius: 5px;
    overflow: hidden;
    max-height: 200px;
    overflow-y: auto;
  }
  .src-preview pre[class*="language-"] {
    margin: 0;
    background: transparent;
    padding: .6rem .75rem;
    border-radius: 0;
    font-size: .8rem;
    overflow-x: auto;
  }
  .src-preview code[class*="language-"] {
    font-size: .8rem;
    background: transparent;
  }

  /* Copy & action buttons */
  .copy-btn, .expand-btn {
    background: none;
    border: 1px solid #c8d6e5;
    border-radius: 4px;
    padding: .15rem .5rem;
    font-size: .7rem;
    color: #64748b;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .copy-btn:hover, .expand-btn:hover {
    background: #eef2f7;
    color: #1F4E79;
    border-color: #1F4E79;
  }
  .copy-btn.copied {
    background: #dcfce7;
    color: #166534;
    border-color: #166534;
  }

  .code-copy-btn {
    position: absolute;
    top: .4rem;
    right: .4rem;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 4px;
    padding: .2rem .5rem;
    font-size: .65rem;
    color: rgba(255,255,255,.6);
    cursor: pointer;
    opacity: 0;
    transition: opacity .2s;
  }
  pre:hover .code-copy-btn { opacity: 1; }
  .code-copy-btn:hover { background: rgba(255,255,255,.2); color: #fff; }
  .code-copy-btn.copied { background: rgba(22,101,52,.5); color: #dcfce7; opacity: 1; }

  .answer-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: .25rem;
  }

  /* Expanded source view */
  .src-expanded {
    background: #1a1a2e;
    border-radius: 5px;
    overflow-x: auto;
    max-height: 500px;
    overflow-y: auto;
  }
  .src-expanded table {
    border-collapse: collapse;
    width: 100%;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: .78rem;
    color: #e2e8f0;
  }
  .src-expanded .line-num {
    user-select: none;
    padding: 0 .75rem 0 .5rem;
    text-align: right;
    color: #64748b;
    border-right: 1px solid #334155;
    width: 1%;
    white-space: nowrap;
    vertical-align: top;
  }
  .src-expanded .line-code {
    padding: 0 .75rem;
    white-space: pre;
  }
  .src-expanded tr.highlighted { background: rgba(31,78,121,.3); }
  .src-expanded tr.highlighted .line-num {
    color: #7dd3fc;
    border-right-color: #1F4E79;
  }

  /* Error */
  .error {
    display: none;
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    background: #fee2e2;
    color: #991b1b;
    border-radius: 8px;
    font-size: .9rem;
  }

  /* Example query chips */
  #examples {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .example-chip {
    background: #fff;
    border: 1px solid #c8d6e5;
    color: #1F4E79;
    font-size: 0.85rem;
    border-radius: 18px;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    transition: background .2s, box-shadow .2s;
  }
  .example-chip:hover {
    background: #eef2f7;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: .75rem;
    color: #999;
  }
</style>
</head>
<body>

<header>
  <h1>COBOLedu</h1>
  <p>GnuCOBOL Code Explorer &mdash; Ask anything about the codebase</p>
</header>

<main>
  <div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="search">Search</button>
    <button class="mode-tab" data-mode="explain">Explain</button>
    <button class="mode-tab" data-mode="dependencies">Dependencies</button>
    <button class="mode-tab" data-mode="patterns">Patterns</button>
    <button class="mode-tab" data-mode="docs">Docs</button>
    <button class="mode-tab" data-mode="business-logic">Business Logic</button>
  </div>

  <form id="form" class="search-wrap" autocomplete="off">
    <input id="q" type="text" placeholder="e.g. Where is the main entry point of the compiler?" autofocus>
    <button id="btn" type="submit">Ask</button>
  </form>

  <div id="examples">
    <button type="button" class="example-chip">main entry point</button>
    <button type="button" class="example-chip">PERFORM VARYING loops</button>
    <button type="button" class="example-chip">CALCULATE-INTEREST</button>
    <button type="button" class="example-chip">error handling patterns</button>
  </div>

  <div class="status-msg" id="status"></div>
  <div class="error" id="error"></div>
  <div id="answer"></div>
  <div id="sources"></div>
</main>

<footer>COBOLedu &middot; Powered by Voyage Code 3 + Pinecone + Claude</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js" data-manual></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-cobol.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
const form    = document.getElementById("form");
const input   = document.getElementById("q");
const btn     = document.getElementById("btn");
const status  = document.getElementById("status");
const ansDiv  = document.getElementById("answer");
const srcDiv  = document.getElementById("sources");
const errDiv  = document.getElementById("error");
const examplesDiv = document.getElementById("examples");
const modeTabs = document.getElementById("modeTabs");

let currentMode = "search";

const MODE_CONFIG = {
  search: {
    placeholder: "e.g. Where is the main entry point of the compiler?",
    buttonText: "Ask",
    examples: ["main entry point", "PERFORM VARYING loops", "CALCULATE-INTEREST", "error handling patterns"],
    endpoint: "/api/query/stream",
    streaming: true,
    bodyKey: "question",
  },
  explain: {
    placeholder: "e.g. Explain what the CALCULATE-INTEREST paragraph does",
    buttonText: "Explain",
    examples: ["CALCULATE-INTEREST paragraph", "cob_move function", "INIT-ROUTINE", "main() in cobc.c"],
    endpoint: "/api/explain/stream",
    streaming: true,
    bodyKey: "query",
  },
  dependencies: {
    placeholder: "e.g. INIT-ROUTINE or cob_move",
    buttonText: "Analyse",
    examples: ["INIT-ROUTINE", "PROCESS-DATA", "cob_move", "cb_validate_move"],
    endpoint: "/api/dependencies/stream",
    streaming: true,
    bodyKey: "name",
  },
  patterns: {
    placeholder: "e.g. error handling patterns or file I/O operations",
    buttonText: "Find",
    examples: ["error handling", "file I/O operations", "loop with counter", "data validation"],
    endpoint: "/api/patterns",
    streaming: false,
    bodyKey: "description",
  },
  docs: {
    placeholder: "e.g. cob_move or CALCULATE-INTEREST",
    buttonText: "Generate",
    examples: ["cob_move", "cob_decimal_push", "CALCULATE-INTEREST", "VALIDATE-CUSTOMER"],
    endpoint: "/api/docs/stream",
    streaming: true,
    bodyKey: "name",
  },
  "business-logic": {
    placeholder: "e.g. CALCULATE-INTEREST or VALIDATE-CUSTOMER",
    buttonText: "Extract",
    examples: ["CALCULATE-INTEREST", "VALIDATE-CUSTOMER", "PROCESS-DATA", "INIT-ROUTINE"],
    endpoint: "/api/business-logic/stream",
    streaming: true,
    bodyKey: "name",
  },
};

function hide(...els) { els.forEach(e => e.style.display = "none"); }
function show(el, d) { el.style.display = d || "block"; }

if (typeof marked !== "undefined") {
  marked.setOptions({ breaks: true, gfm: true });
}

function renderMarkdown(text) {
  if (typeof marked !== "undefined") return marked.parse(text);
  let html = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\n/g, "<br>");
  html = html.replace(/<br>(<pre>)/g, "$1").replace(/(<\/pre>)<br>/g, "$1");
  return html;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

let lastAnswerMarkdown = "";
let lastSources = [];

function detectLang(filePath) {
  if (!filePath) return "clike";
  const ext = filePath.split(".").pop().toLowerCase();
  const map = { c: "c", h: "c", l: "c", y: "c", cob: "cobol", cbl: "cobol", cpy: "cobol", conf: "ini" };
  return map[ext] || "clike";
}

function copyToClipboard(text, btnEl) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btnEl.textContent;
    btnEl.textContent = "Copied!";
    btnEl.classList.add("copied");
    setTimeout(() => { btnEl.textContent = orig; btnEl.classList.remove("copied"); }, 1500);
  });
}

function injectCodeCopyButtons(container) {
  container.querySelectorAll("pre").forEach(pre => {
    if (pre.querySelector(".code-copy-btn")) return;
    const btn = document.createElement("button");
    btn.className = "code-copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const code = pre.querySelector("code") ? pre.querySelector("code").textContent : pre.textContent;
      copyToClipboard(code, btn);
    });
    pre.style.position = "relative";
    pre.appendChild(btn);
  });
}

function finalizeAnswer() {
  if (typeof Prism !== "undefined") Prism.highlightAllUnder(ansDiv);
  injectCodeCopyButtons(ansDiv);
  if (!ansDiv.querySelector(".answer-copy-btn")) {
    const hdr = document.createElement("div");
    hdr.className = "answer-header";
    const btn = document.createElement("button");
    btn.className = "copy-btn answer-copy-btn";
    btn.textContent = "Copy Answer";
    btn.addEventListener("click", () => copyToClipboard(lastAnswerMarkdown, btn));
    hdr.appendChild(btn);
    ansDiv.insertBefore(hdr, ansDiv.firstChild);
  }
}

/* ---- Mode switching ---- */
modeTabs.addEventListener("click", (e) => {
  const tab = e.target.closest(".mode-tab");
  if (!tab) return;
  const mode = tab.dataset.mode;
  if (mode === currentMode) return;

  currentMode = mode;
  modeTabs.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");

  const cfg = MODE_CONFIG[mode];
  input.placeholder = cfg.placeholder;
  btn.textContent = cfg.buttonText;
  input.value = "";

  examplesDiv.innerHTML = cfg.examples
    .map(ex => `<button type="button" class="example-chip">${esc(ex)}</button>`)
    .join("");
  show(examplesDiv, "flex");

  hide(ansDiv, srcDiv, errDiv);
});

/* ---- Status phase manager ---- */
let statusTimers = [];

function setStatus(text) {
  status.classList.remove("visible");
  setTimeout(() => {
    status.textContent = text;
    status.classList.add("visible");
  }, 50);
}

function startStatusPhases() {
  status.style.display = "block";
  setStatus("Searching codebase\u2026");
  statusTimers.push(setTimeout(() => setStatus("Reading source files\u2026"), 2000));
  statusTimers.push(setTimeout(() => setStatus("Generating answer\u2026"), 5000));
}

function clearStatus() {
  statusTimers.forEach(clearTimeout);
  statusTimers = [];
  status.classList.remove("visible");
  setTimeout(() => { status.style.display = "none"; }, 350);
}

/* ---- SSE helpers ---- */
function parseSSE(raw) {
  const events = [];
  const blocks = raw.split("\n\n");
  for (const block of blocks) {
    if (!block.trim()) continue;
    let type = "message", data = "";
    for (const line of block.split("\n")) {
      if (line.startsWith("event: ")) type = line.slice(7);
      else if (line.startsWith("data: ")) data = line.slice(6);
      else if (line.startsWith("data:")) data = line.slice(5);
    }
    events.push({ type, data });
  }
  return events;
}

function renderSources(sources) {
  if (!sources || !sources.length) return;
  lastSources = sources;
  let html = "<h3>Sources</h3>";
  for (let i = 0; i < sources.length; i++) {
    const s = sources[i];
    const lang = detectLang(s.file_path);
    html += `<div class="src-card" data-idx="${i}">
      <div class="src-meta">
        <span class="badge">${esc(s.file_path)}:${s.line_start}-${s.line_end}</span>
        <span class="badge" style="background:#3b82f6">${esc(s.chunk_type)}</span>
        <span class="score">score ${s.score.toFixed(3)}</span>
        <button class="copy-btn src-copy-btn" data-idx="${i}">Copy</button>
        <button class="expand-btn" data-idx="${i}">Expand</button>
      </div>
      <div class="src-preview"><pre class="language-${lang}"><code class="language-${lang}">${esc(s.preview)}</code></pre></div>
    </div>`;
  }
  srcDiv.innerHTML = html;
  show(srcDiv);
  if (typeof Prism !== "undefined") Prism.highlightAllUnder(srcDiv);
}

/* ---- Dependency rendering ---- */
function renderDependencies(data) {
  let html = "";
  if (data.callers && data.callers.length) {
    html += `<div class="dep-section"><h4>Callers (calls ${esc(data.target)})</h4><div class="dep-list">`;
    data.callers.forEach(c => { html += `<span class="dep-badge caller">${esc(c)}</span>`; });
    html += `</div></div>`;
  }
  if (data.callees && data.callees.length) {
    html += `<div class="dep-section"><h4>Callees (called by ${esc(data.target)})</h4><div class="dep-list">`;
    data.callees.forEach(c => { html += `<span class="dep-badge callee">${esc(c)}</span>`; });
    html += `</div></div>`;
  }
  html += renderMarkdown(data.analysis || "");
  ansDiv.innerHTML = html;
  show(ansDiv);
  renderSources(data.sources);
}

/* ---- Non-streaming feature request ---- */
async function doFeatureRequest(cfg, inputValue) {
  const body = {};
  body[cfg.bodyKey] = inputValue;

  const res = await fetch(cfg.endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const detail = await res.json().catch(() => null);
    throw new Error(detail?.detail || `Request failed (${res.status})`);
  }

  return await res.json();
}

/* ---- Generic streaming request (SSE) ---- */
async function doStreamingRequest(cfg, inputValue) {
  let accumulated = "";
  let firstToken = true;
  let depMeta = null;

  const body = {};
  body[cfg.bodyKey] = inputValue;

  const res = await fetch(cfg.endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const detail = await res.json().catch(() => null);
    throw new Error(detail?.detail || `Request failed (${res.status})`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });

    const lastDoubleNewline = buffer.lastIndexOf("\n\n");
    if (lastDoubleNewline < 0) continue;

    const complete = buffer.slice(0, lastDoubleNewline + 2);
    buffer = buffer.slice(lastDoubleNewline + 2);
    const events = parseSSE(complete);

    for (const evt of events) {
      if (evt.type === "token") {
        if (firstToken) {
          clearStatus();
          show(ansDiv);
          firstToken = false;
        }
        accumulated += JSON.parse(evt.data);
        ansDiv.innerHTML = renderMarkdown(accumulated);
      } else if (evt.type === "metadata") {
        depMeta = JSON.parse(evt.data);
      } else if (evt.type === "sources") {
        if (depMeta) {
          let badgeHtml = "";
          if (depMeta.callers && depMeta.callers.length) {
            badgeHtml += `<div class="dep-section"><h4>Callers (calls ${esc(depMeta.target)})</h4><div class="dep-list">`;
            depMeta.callers.forEach(c => { badgeHtml += `<span class="dep-badge caller">${esc(c)}</span>`; });
            badgeHtml += `</div></div>`;
          }
          if (depMeta.callees && depMeta.callees.length) {
            badgeHtml += `<div class="dep-section"><h4>Callees (called by ${esc(depMeta.target)})</h4><div class="dep-list">`;
            depMeta.callees.forEach(c => { badgeHtml += `<span class="dep-badge callee">${esc(c)}</span>`; });
            badgeHtml += `</div></div>`;
          }
          ansDiv.innerHTML = badgeHtml + renderMarkdown(accumulated);
        }
        renderSources(JSON.parse(evt.data));
      } else if (evt.type === "error") {
        const msg = JSON.parse(evt.data);
        if (accumulated) {
          ansDiv.innerHTML = renderMarkdown(accumulated)
            + `<div style="margin-top:1rem;padding:.75rem 1rem;background:#fee2e2;color:#991b1b;border-radius:6px;font-size:.85rem">Stream interrupted \u2014 partial answer shown.<br>${esc(msg)}</div>`;
        } else {
          errDiv.textContent = msg;
          show(errDiv);
        }
      }
    }
  }
  lastAnswerMarkdown = accumulated;
  if (accumulated) finalizeAnswer();
  return accumulated;
}

/* ---- Form handler ---- */
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const val = input.value.trim();
  if (!val) return;

  hide(ansDiv, srcDiv, errDiv, examplesDiv);
  btn.disabled = true;
  startStatusPhases();

  const cfg = MODE_CONFIG[currentMode];

  try {
    if (cfg.streaming) {
      await doStreamingRequest(cfg, val);
    } else {
      const data = await doFeatureRequest(cfg, val);
      clearStatus();

      if (currentMode === "patterns") {
        ansDiv.innerHTML = `<h3>Pattern: ${esc(data.description)}</h3><p>${data.matches.length} matching chunks found</p>`;
        show(ansDiv);
        renderSources(data.matches);
        lastAnswerMarkdown = data.description;
      } else {
        const content = data.explanation || data.documentation || data.logic || "";
        ansDiv.innerHTML = renderMarkdown(content);
        show(ansDiv);
        renderSources(data.sources);
        lastAnswerMarkdown = content;
        finalizeAnswer();
      }
    }
  } catch (err) {
    clearStatus();
    errDiv.textContent = err.message || "Something went wrong. Please try again.";
    show(errDiv);
  } finally {
    clearStatus();
    btn.disabled = false;
  }
});

examplesDiv.addEventListener("click", (e) => {
  if (!e.target.classList.contains("example-chip")) return;
  input.value = e.target.textContent;
  form.requestSubmit();
});

/* ---- Source card actions (copy / expand) ---- */
srcDiv.addEventListener("click", (e) => {
  const copyBtn = e.target.closest(".src-copy-btn");
  if (copyBtn) {
    const idx = parseInt(copyBtn.dataset.idx);
    const s = lastSources[idx];
    if (s) copyToClipboard(s.preview, copyBtn);
    return;
  }

  const expandBtn = e.target.closest(".expand-btn");
  if (!expandBtn) return;
  const card = expandBtn.closest(".src-card");
  const idx = parseInt(expandBtn.dataset.idx);
  const s = lastSources[idx];
  if (!s) return;

  if (expandBtn.textContent === "Collapse") {
    const lang = detectLang(s.file_path);
    const wrap = card.querySelector(".src-expanded");
    if (wrap) {
      wrap.className = "src-preview";
      wrap.innerHTML = `<pre class="language-${lang}"><code class="language-${lang}">${esc(s.preview)}</code></pre>`;
      if (typeof Prism !== "undefined") Prism.highlightAllUnder(wrap);
    }
    expandBtn.textContent = "Expand";
    return;
  }

  expandBtn.textContent = "Loading\u2026";
  expandBtn.disabled = true;
  fetch(`/api/file?path=${encodeURIComponent(s.file_path)}&line_start=${s.line_start}&line_end=${s.line_end}`)
    .then(r => { if (!r.ok) throw new Error("File not found"); return r.json(); })
    .then(data => {
      const wrap = card.querySelector(".src-preview");
      const lang = detectLang(s.file_path);
      const grammar = (typeof Prism !== "undefined" && Prism.languages[lang]) || null;
      const lines = data.content.split("\n");
      let html = "<table>";
      for (let i = 0; i < lines.length; i++) {
        const num = data.start_line + i;
        const hl = num >= s.line_start && num <= s.line_end;
        const code = grammar ? Prism.highlight(lines[i], grammar, lang) : esc(lines[i]);
        html += `<tr class="${hl ? "highlighted" : ""}"><td class="line-num">${num}</td><td class="line-code">${code || "&nbsp;"}</td></tr>`;
      }
      html += "</table>";
      wrap.className = "src-expanded";
      wrap.innerHTML = html;
      expandBtn.textContent = "Collapse";
      expandBtn.disabled = false;
    })
    .catch(() => {
      expandBtn.textContent = "Expand";
      expandBtn.disabled = false;
    });
});
</script>
</body>
</html>
