<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBOLedu — GnuCOBOL Code Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1F4E79;
    color: #fff;
    padding: 1.25rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .02em; }
  header p  { font-size: .85rem; opacity: .8; margin-top: .25rem; }

  main {
    flex: 1;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  /* Search */
  .search-wrap {
    display: flex;
    gap: .5rem;
  }
  #q {
    flex: 1;
    padding: .7rem 1rem;
    font-size: 1rem;
    border: 2px solid #c8d6e5;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }
  #q:focus { border-color: #1F4E79; }
  #btn {
    padding: .7rem 1.4rem;
    font-size: 1rem;
    font-weight: 600;
    background: #1F4E79;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .2s;
    white-space: nowrap;
  }
  #btn:hover { opacity: .9; }
  #btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Status message */
  .status-msg {
    display: none;
    margin: 2rem auto;
    text-align: center;
    font-size: .95rem;
    color: #999;
    opacity: 0;
    transition: opacity .35s ease;
  }
  .status-msg.visible { opacity: 1; }
  .status-msg.fade-out { opacity: 0; }

  /* Answer */
  #answer {
    display: none;
    margin-top: 1.5rem;
    background: #fff;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    line-height: 1.65;
    word-wrap: break-word;
  }
  #answer p { margin: .5em 0; }
  #answer ul, #answer ol { margin: .5em 0 .5em 1.5em; }
  #answer li { margin: .25em 0; }
  #answer code {
    background: #eef2f7;
    padding: .15em .35em;
    border-radius: 4px;
    font-size: .9em;
  }
  #answer pre {
    background: #1a1a2e;
    color: #e2e8f0;
    padding: 1rem;
    border-radius: 6px;
    overflow-x: auto;
    margin: .75rem 0;
    white-space: pre;
  }
  #answer pre code {
    background: none;
    padding: 0;
    color: inherit;
  }

  /* Sources */
  #sources {
    display: none;
    margin-top: 1.25rem;
  }
  #sources h3 {
    font-size: .95rem;
    margin-bottom: .6rem;
    color: #555;
  }
  .src-card {
    background: #fff;
    border-radius: 8px;
    padding: .85rem 1rem;
    margin-bottom: .6rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .src-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    align-items: center;
    margin-bottom: .4rem;
  }
  .badge {
    display: inline-block;
    font-size: .75rem;
    font-weight: 600;
    padding: .2rem .55rem;
    border-radius: 4px;
    background: #1F4E79;
    color: #fff;
  }
  .score {
    font-size: .75rem;
    color: #888;
  }
  .src-preview {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: .8rem;
    background: #f0f4f8;
    padding: .6rem .75rem;
    border-radius: 5px;
    overflow-x: auto;
    white-space: pre;
    color: #334155;
    max-height: 160px;
  }

  /* Error */
  .error {
    display: none;
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    background: #fee2e2;
    color: #991b1b;
    border-radius: 8px;
    font-size: .9rem;
  }

  /* Example query chips */
  #examples {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .example-chip {
    background: #fff;
    border: 1px solid #c8d6e5;
    color: #1F4E79;
    font-size: 0.85rem;
    border-radius: 18px;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    transition: background .2s, box-shadow .2s;
  }
  .example-chip:hover {
    background: #eef2f7;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: .75rem;
    color: #999;
  }
</style>
</head>
<body>

<header>
  <h1>COBOLedu</h1>
  <p>GnuCOBOL Code Explorer &mdash; Ask anything about the codebase</p>
</header>

<main>
  <form id="form" class="search-wrap" autocomplete="off">
    <input id="q" type="text" placeholder="e.g. Where is the main entry point of the compiler?" autofocus>
    <button id="btn" type="submit">Ask</button>
  </form>

  <div id="examples">
    <button type="button" class="example-chip">main entry point</button>
    <button type="button" class="example-chip">PERFORM VARYING loops</button>
    <button type="button" class="example-chip">CALCULATE-INTEREST</button>
    <button type="button" class="example-chip">error handling patterns</button>
  </div>

  <div class="status-msg" id="status"></div>
  <div class="error" id="error"></div>
  <div id="answer"></div>
  <div id="sources"></div>
</main>

<footer>COBOLedu &middot; Powered by Voyage Code 3 + Pinecone + Claude</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const form    = document.getElementById("form");
const input   = document.getElementById("q");
const btn     = document.getElementById("btn");
const status  = document.getElementById("status");
const ansDiv  = document.getElementById("answer");
const srcDiv  = document.getElementById("sources");
const errDiv  = document.getElementById("error");
const examplesDiv = document.getElementById("examples");

function hide(...els) { els.forEach(e => e.style.display = "none"); }
function show(el, d) { el.style.display = d || "block"; }

if (typeof marked !== "undefined") {
  marked.setOptions({ breaks: true, gfm: true });
}

function renderMarkdown(text) {
  if (typeof marked !== "undefined") return marked.parse(text);
  let html = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\n/g, "<br>");
  html = html.replace(/<br>(<pre>)/g, "$1").replace(/(<\/pre>)<br>/g, "$1");
  return html;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

/* ---- Status phase manager ---- */
let statusTimers = [];

function setStatus(text) {
  status.classList.remove("visible");
  setTimeout(() => {
    status.textContent = text;
    status.classList.add("visible");
  }, 50);
}

function startStatusPhases() {
  status.style.display = "block";
  setStatus("Searching codebase\u2026");
  statusTimers.push(setTimeout(() => setStatus("Reading source files\u2026"), 2000));
  statusTimers.push(setTimeout(() => setStatus("Generating answer\u2026"), 5000));
}

function clearStatus() {
  statusTimers.forEach(clearTimeout);
  statusTimers = [];
  status.classList.remove("visible");
  setTimeout(() => { status.style.display = "none"; }, 350);
}

/* ---- SSE helpers ---- */
function parseSSE(raw) {
  const events = [];
  const blocks = raw.split("\n\n");
  for (const block of blocks) {
    if (!block.trim()) continue;
    let type = "message", data = "";
    for (const line of block.split("\n")) {
      if (line.startsWith("event: ")) type = line.slice(7);
      else if (line.startsWith("data: ")) data = line.slice(6);
      else if (line.startsWith("data:")) data = line.slice(5);
    }
    events.push({ type, data });
  }
  return events;
}

function renderSources(sources) {
  if (!sources || !sources.length) return;
  let html = "<h3>Sources</h3>";
  for (const s of sources) {
    html += `<div class="src-card">
      <div class="src-meta">
        <span class="badge">${esc(s.file_path)}:${s.line_start}-${s.line_end}</span>
        <span class="badge" style="background:#3b82f6">${esc(s.chunk_type)}</span>
        <span class="score">score ${s.score.toFixed(3)}</span>
      </div>
      <div class="src-preview">${esc(s.preview)}</div>
    </div>`;
  }
  srcDiv.innerHTML = html;
  show(srcDiv);
}

/* ---- Form handler ---- */
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  hide(ansDiv, srcDiv, errDiv, examplesDiv);
  btn.disabled = true;
  startStatusPhases();

  let accumulated = "";
  let firstToken = true;

  try {
    const res = await fetch("/api/query/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    if (!res.ok) {
      const detail = await res.json().catch(() => null);
      throw new Error(detail?.detail || `Request failed (${res.status})`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      const lastDoubleNewline = buffer.lastIndexOf("\n\n");
      if (lastDoubleNewline < 0) continue;

      const complete = buffer.slice(0, lastDoubleNewline + 2);
      buffer = buffer.slice(lastDoubleNewline + 2);
      const events = parseSSE(complete);

      for (const evt of events) {
        if (evt.type === "token") {
          if (firstToken) {
            clearStatus();
            show(ansDiv);
            firstToken = false;
          }
          accumulated += JSON.parse(evt.data);
          ansDiv.innerHTML = renderMarkdown(accumulated);
        } else if (evt.type === "sources") {
          renderSources(JSON.parse(evt.data));
        } else if (evt.type === "error") {
          const msg = JSON.parse(evt.data);
          if (accumulated) {
            ansDiv.innerHTML = renderMarkdown(accumulated)
              + `<div style="margin-top:1rem;padding:.75rem 1rem;background:#fee2e2;color:#991b1b;border-radius:6px;font-size:.85rem">Stream interrupted \u2014 partial answer shown.<br>${esc(msg)}</div>`;
          } else {
            errDiv.textContent = msg;
            show(errDiv);
          }
        }
      }
    }
  } catch (err) {
    clearStatus();
    if (accumulated) {
      ansDiv.innerHTML = renderMarkdown(accumulated)
        + `<div style="margin-top:1rem;padding:.75rem 1rem;background:#fee2e2;color:#991b1b;border-radius:6px;font-size:.85rem">Stream interrupted \u2014 partial answer shown.</div>`;
      show(ansDiv);
    } else {
      errDiv.textContent = err.message || "Something went wrong. Please try again.";
      show(errDiv);
    }
  } finally {
    clearStatus();
    btn.disabled = false;
  }
});

examplesDiv.addEventListener("click", (e) => {
  if (!e.target.classList.contains("example-chip")) return;
  input.value = e.target.textContent;
  form.requestSubmit();
});
</script>
</body>
</html>
